<span class="docs-eyebrow">Overlays</span>
        <h1 class="docs-title">Toast</h1>
        <p class="docs-lead">
          Lightweight push notifications. Call <code>new vitrus.Toast(el).show()</code> or use the markup below.
        </p>
        <section class="docs-section">
          <h2 class="docs-section-title">Basic toast</h2>
          <div class="docs-example">
            <button type="button" class="btn btn-primary" id="toastShowBtn">Show toast</button>
            <div class="toast-container position-fixed bottom-0 end-0 p-3">
              <div id="liveToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
                <div class="toast-header">
                  <strong class="me-auto">Vitrus</strong>
                  <small>Just now</small>
                  <button type="button" class="btn-close" data-vitrus-dismiss="toast" aria-label="Close"></button>
                </div>
                <div class="toast-body">Hello, world! This is a toast message.</div>
              </div>
            </div>
          </div>
        </section>
        <footer class="docs-footer">VitrusCSS · Toast</footer>
