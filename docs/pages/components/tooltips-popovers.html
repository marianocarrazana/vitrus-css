<span class="docs-eyebrow">Overlays</span>
        <h1 class="docs-title">Tooltips &amp; Popovers</h1>
        <p class="docs-lead">
          Small overlays positioned with Popper. Initialize via
          <code>data-vitrus-toggle="tooltip"</code> or <code>data-vitrus-toggle="popover"</code>.
        </p>
        <section class="docs-section">
          <h2 class="docs-section-title">Tooltip</h2>
          <div class="docs-example">
            <button
              type="button"
              class="btn btn-secondary"
              data-vitrus-toggle="tooltip"
              data-vitrus-placement="top"
              data-vitrus-title="Tooltip on top"
            >
              Tooltip on top
            </button>
          </div>
        </section>
        <section class="docs-section">
          <h2 class="docs-section-title">Popover</h2>
          <div class="docs-example">
            <button
              type="button"
              class="btn btn-danger"
              data-vitrus-toggle="popover"
              data-vitrus-title="Popover title"
              data-vitrus-content="And here's some amazing content."
            >
              Click to toggle popover
            </button>
          </div>
        </section>
        <footer class="docs-footer">VitrusCSS · Tooltips &amp; Popovers</footer>
