<span class="docs-eyebrow">Components</span>
        <h1 class="docs-title">Progress</h1>
        <p class="docs-lead">Visual indicators for completion status. Set width on <code>.progress-bar</code>.</p>

        <section class="docs-section">
          <h2 class="docs-section-title">Basic example</h2>

          <div class="docs-example">
            <div class="progress" role="progressbar" aria-valuenow="50" aria-valuemin="0" aria-valuemax="100">
              <div class="progress-bar" style="width: 50%">50%</div>
            </div>
          </div>

          <div class="docs-code">
            <pre><code>&lt;div class="progress"&gt;
  &lt;div class="progress-bar" style="width: 50%"&gt;50%&lt;/div&gt;
&lt;/div&gt;</code></pre>
          </div>
        </section>

        <section class="docs-section">
          <h2 class="docs-section-title">Variants</h2>

          <div class="docs-example">
            <div class="progress mb-3">
              <div class="progress-bar bg-success" style="width: 25%"></div>
            </div>
            <div class="progress mb-3">
              <div class="progress-bar bg-info" style="width: 50%"></div>
            </div>
            <div class="progress mb-0">
              <div class="progress-bar bg-warning" style="width: 75%"></div>
            </div>
          </div>
        </section>

        <section class="docs-section">
          <h2 class="docs-section-title">Striped &amp; animated</h2>

          <div class="docs-example">
            <div class="progress">
              <div
                class="progress-bar progress-bar-striped progress-bar-animated"
                style="width: 65%"
              ></div>
            </div>
          </div>
        </section>

        <footer class="docs-footer">VitrusCSS · Progress</footer>
